name: Build ME_OpenDRT macOS (arm64 + x86_64)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    env:
      OPENDRT_VERSION: v1.2.4
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            zip_name: ME_OpenDRT_v1.2.4_macOS_arm64_portable.zip
            artifact_name: ME_OpenDRT-v1.2.4-macos-arm64
          - arch: x86_64
            runner: macos-15-intel
            zip_name: ME_OpenDRT_v1.2.4_macOS_x86_64_portable.zip
            artifact_name: ME_OpenDRT-v1.2.4-macos-x86_64

    runs-on: ${{ matrix.runner }}

    defaults:
      run:
        shell: bash
        working-directory: ME_OpenDRT/source

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure build tools are available
        run: |
          if command -v ninja >/dev/null 2>&1; then
            echo "ninja already available: $(command -v ninja)"
            ninja --version
          else
            brew install ninja
          fi

      - name: Configure
        run: cmake -S . -B build-mac -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }} -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 -DME_OPENDRT_BUILD_CUBE_VIEWER_STUB=ON -DME_OPENDRT_VIEWER_FORCE_BUNDLED_GLFW=ON

      - name: Build
        run: cmake --build build-mac --config Release

      - name: Verify bundle outputs
        run: |
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT_CubeViewer
          test -f bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib
          otool -l bundle/ME_OpenDRT.ofx.bundle/Contents/MacOS/ME_OpenDRT.ofx | grep -A3 LC_BUILD_VERSION | grep -q "minos 13.0"
          strings bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -E -q "air64-apple-macosx13(\\.|$)"
          xcrun metal-objdump -t bundle/ME_OpenDRT.ofx.bundle/Contents/Resources/OpenDRT.metallib | grep -q "OpenDRTKernel"

      - name: Package macOS portable bundle
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            bundle/ME_OpenDRT.ofx.bundle \
            ../../${{ matrix.zip_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.zip_name }}
